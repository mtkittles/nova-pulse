<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
  <title id="title">Gwyden Studio logo</title>
  <desc id="desc">Premium Celtic-inspired G monogram with tree and roots motif for Gwyden Studio.</desc>
  <defs>
