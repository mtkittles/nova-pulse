      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.36  0 0 0 0 0.88  0 0 0 0 0.91  0 0 0 0.18 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
